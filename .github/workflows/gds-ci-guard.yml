name: GDS CI guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: narimato

      - uses: actions/checkout@v4
        with:
          repository: sovereignsquad/general-design-system
          path: general-design-system

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build GDS packages
        working-directory: general-design-system
        run: npm ci && npm run build

      - name: Install and verify Narimato
        working-directory: narimato
        run: |
          npm ci
          npm run gds:ci-guard
          npm run gds:validate
          npm run gds:compliance
          npm run lint
          npm run build
