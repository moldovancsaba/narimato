name: GDS CI guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and verify Narimato
        run: |
          npm ci
          npm run gds:ci-guard
          npm run gds:validate
          npm run gds:compliance
          npm run lint
          npm run build
