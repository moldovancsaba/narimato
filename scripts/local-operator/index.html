<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Narimato Setup</title>
    <script>
      try {
        var key = 'mantine-color-scheme-value';
        var stored = window.localStorage.getItem(key);
        var scheme =
          stored === 'dark' || stored === 'light'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-mantine-color-scheme', scheme);
      } catch (e) {
        document.documentElement.setAttribute('data-mantine-color-scheme', 'light');
      }
    </script>
    <link rel="stylesheet" href="/bundle.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100vh;
        height: 100%;
      }
      body {
        background: var(--mantine-color-body, #fff);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <p style="padding: 1rem; font-family: system-ui, sans-serif">Loading Narimato Setup…</p>
    </div>
    <script src="/bundle.js"></script>
    <script>
      window.addEventListener('error', function (e) {
        var root = document.getElementById('root');
        if (root && root.childNodes.length < 2) {
          root.innerHTML =
            '<pre style="padding:1rem;color:#b42318;white-space:pre-wrap;font:13px/1.4 system-ui,sans-serif">' +
            'Narimato Setup failed to load. Try: cd narimato && npm run build:operator && npm run intelligence:status-server\\n\\n' +
            (e.message || e) +
            '</pre>';
        }
      });
    </script>
  </body>
</html>
